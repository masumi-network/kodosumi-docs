version: '3.8'

services:
  kodosumi-docs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_DOCS_URL=https://docs.kodosumi.io
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/guides"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
